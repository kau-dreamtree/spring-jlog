name: CD

on: push

jobs:
  build:
    runs-on: rpi4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: bootJar로 jar 파일 생성
        run: ./gradlew bootJar

      - name: Artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: jlog
          path: build/libs/*.jar

  deploy:
    needs: build
    environment: deploy test
    runs-on: rpi4
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: jlog
          path: ${{ secrets.SPRING_ARTIFACT_PATH }}

      - name: Run artifact
        working-directory: ${{ secrets.PROJECT_DIR }}
        run: ${{ secrets.RUN_SERVER }}
