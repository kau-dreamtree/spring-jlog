name: CD

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Cache gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Boot jar
        run: ./gradlew bootJar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jlog
          path: build/libs/jlog.jar

  deploy:
    needs: build
    environment: deploy test
    runs-on: rpi4
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PRIVATE_REPO_ACCESS }}

      - name: Copy properties
        working-directory: src/main/resources/modules
        run: cp *.yml ${{ secrets.SPRING_ARTIFACT_PATH }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: jlog
          path: ${{ secrets.SPRING_ARTIFACT_PATH }}

      - name: Run artifact
        working-directory: ${{ secrets.PROJECT_PATH }}
        run: ${{ secrets.RUN_SERVER }}
